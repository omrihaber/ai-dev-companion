services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: adc
      POSTGRES_PASSWORD: adc
      POSTGRES_DB: adc
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollama:/root/.ollama"]
volumes:
  pgdata:
  ollama:
